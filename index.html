    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="GCP Executive Briefing - Real-time landscape analysis and critical updates for Google Cloud Platform." />
    <meta name="theme-color" content="#ffffff" />
    <script>
      (function() {
        try {
          const savedTheme = localStorage.getItem('theme') || 'light';
          document.documentElement.classList.add(savedTheme);
        } catch (e) {
          console.warn('Theme initialization failed:', e);
          document.documentElement.classList.add('light');
        }
      })();

      // Global error handler for initial load failures (e.g., ChunkLoadError)
      window.addEventListener('error', function(e) {
        if (e.message && (e.message.includes('ChunkLoadError') || e.message.includes('Failed to fetch dynamically imported module'))) {
          console.warn('Initial load failure detected. Flushing caches and reloading...');
          localStorage.clear();
          sessionStorage.clear();
          if ('caches' in window) {
            caches.keys().then(names => {
              for (let name of names) caches.delete(name);
            });
          }
          setTimeout(() => {
            window.location.reload();
          }, 2000);
        }
      }, true);
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
